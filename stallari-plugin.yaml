name: ntfy-blade-mcp
version: "0.1.1"
description: "ntfy push notification MCP — publish, poll, topic and token management"
author: groupthink-dev
license: MIT
tier: certified
author_type: first-party
readiness: beta
contract: notifications-push-v1

services:
  notifications:
    info: ntfy_info
    publish: ntfy_publish
    cancel: ntfy_cancel
    poll: ntfy_poll
    account: ntfy_account
  topics:
    reserve: ntfy_reserve
    unreserve: ntfy_unreserve
  tokens:
    create: ntfy_token_create
    extend: ntfy_token_extend
    revoke: ntfy_token_revoke

setup:
  icon: "🔔"
  blurb: "Send push notifications, poll topics, manage access tokens via ntfy"
  auth_model: bearer_token
  complexity: simple
  fields:
    - key: NTFY_BASE_URL
      label: "Server URL"
      required: true
      placeholder: "https://ntfy.sh"
      help: "ntfy server URL — use ntfy.sh or your self-hosted instance"
    - key: NTFY_TOKEN
      label: "Access Token"
      secret: true
      required: false
      placeholder: "tk_..."
      help: "Bearer token for authenticated topics. Optional for public topics"
    - key: NTFY_DEFAULT_TOPIC
      label: "Default Topic"
      required: false
      placeholder: "my-alerts"
      help: "Used when no topic is specified in publish"
    - key: NTFY_WRITE_ENABLED
      label: "Enable write operations"
      type: boolean
      required: false
      help: "Publish notifications, manage topics and tokens"

install:
  runtime: uv
  package: ntfy-blade-mcp
  command: ntfy-blade-mcp

env:
  - name: NTFY_BASE_URL
    secret: false
    required: true
    description: "ntfy server URL (e.g. https://ntfy.sh or self-hosted)"
  - name: NTFY_TOKEN
    secret: true
    required: false
    description: "Bearer token (tk_...). Optional for public topics"
  - name: NTFY_DEFAULT_TOPIC
    secret: false
    required: false
    description: "Default topic when none specified in publish"
  - name: NTFY_WRITE_ENABLED
    secret: false
    required: false
    description: "Set to 'true' to enable write operations"

conformance:
  required: "10/10"
  last_tested: null
